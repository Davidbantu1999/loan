<html>
<head>
    <title>Admin SR Finance</title>
    <style>
        .ft[data-f="completed"].on{background:rgba(34,212,94,.08);border-color:rgba(34,212,94,.22);color:#22d45e}
    </style>
</head>
<body>
    <div class="sc c5" onclick="goCust('completed')"><div class="sc-ico">🏁</div><div class="sc-v" id="stCompleted">0</div><div class="sc-l">Loan Completed</div></div>
    <div class="sc c6"><div class="sc-ico">💰</div><div class="sc-v" id="stTodayAmt">₹0</div><div class="sc-l">Today Collected</div></div>
    </div>
    <div class="ctrl-sec">
        <div class="ctrl-sec-t">🔧 Filter & Search</div>
        <div class="frow">
            <button class="ft on" data-f="all" onclick="setF('all')">All</button>
            <button class="ft" data-f="paid" onclick="setF('paid')">✅ Paid Today</button>
            <button class="ft" data-f="overdue" onclick="setF('overdue')">🔴 Overdue</button>
            <button class="ft" data-f="completed" onclick="setF('completed')">🏁 Loan Completed</button>
            <button class="ft" data-f="notpaid" onclick="setF('notpaid')">⏳ Not Paid</button>
        </div>
        <div class="tbar">
            <div class="swrap"><span class="sico">🔍</span><input type="text" class="srch" id="srch" placeholder="Search name, ID, phone..." oninput="onSearch()"/></div>
            <button class="tbtn bl" onclick="exportCSV()">⬇ CSV</button>
            <button class="tbtn gr" onclick="triggerImport()">⬆ Import</button>
            <input type="file" id="impFile" accept=".csv" style="display:none" onchange="previewImport(this)"/>
        </div>
        <div class="lcount" id="listCount" style="display:none"></div>
    </div>
    <script>
        function goCust(f){
            aFilter=f;aLoc='';custPage=1;
            switchTab('customers');
            document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
            document.querySelectorAll('.ntab')[1].classList.add('on');
            document.querySelectorAll('.ft').forEach(t=>t.classList.toggle('on',t.dataset.f===f));
            renderLocTabs();renderCust();
            window.scrollTo({top:0,behavior:'smooth'});
        }
        function setF(f){aFilter=f;custPage=1;document.querySelectorAll('.ft').forEach(t=>t.classList.toggle('on',t.dataset.f===f));renderCust()}
        function onSearch(){custPage=1;renderCust()}
        cs=cs.map(c=>{
            const pd=calcPaid(c.customerId);const t=Number(c.totalPayable)||0;
            const pct=t>0?Math.min(100,Math.round((pd/t)*100)):0;
            const dn=t>0&&pd>=t;
            const ov=!dn&&isOD(c);
            const tp=isTdPaid(c.customerId);
            const ta=tdPay(c.customerId);
            return{...c,_paid:pd,_t:t,_pn:Math.max(0,t-pd),_pct:pct,_dn:dn,_ov:ov,_tp:tp,_ta:ta};
        });
    </script>
</body>
</html>
